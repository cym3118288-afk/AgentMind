# Dependabot configuration for AgentMind
# This file configures automated dependency updates via GitHub Dependabot
# Documentation: https://docs.github.com/en/code-security/dependabot

version: 2

updates:
  # Python dependencies (pip)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "cym3118288-afk"
    assignees:
      - "cym3118288-afk"
    labels:
      - "dependencies"
      - "python"
      - "automated"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    # Group minor and patch updates together
    groups:
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "patch"
    # Ignore specific dependencies if needed
    ignore:
      # Example: ignore major version updates for specific packages
      # - dependency-name: "package-name"
      #   update-types: ["version-update:semver-major"]

    # Allow both direct and indirect dependencies
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"

    # Rebase strategy for PRs
    rebase-strategy: "auto"

  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "cym3118288-afk"
    assignees:
      - "cym3118288-afk"
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"
    rebase-strategy: "auto"

# Dependabot will:
# 1. Check for dependency updates weekly on Mondays at 9 AM UTC
# 2. Create pull requests for outdated dependencies
# 3. Group minor/patch updates to reduce PR noise
# 4. Automatically assign and label PRs
# 5. Limit concurrent PRs to avoid overwhelming maintainers
# 6. Use semantic commit messages for better changelog generation
#
# Security updates are checked daily by default and are not rate-limited.
#
# To customize:
# - Adjust schedule interval (daily, weekly, monthly)
# - Change reviewers/assignees
# - Modify grouping strategy
# - Add ignore rules for specific packages
# - Change target branch if using different workflow
